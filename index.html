<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Portfolio - Dynamic JSON Driven</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Live reload helper: attempts to load Live Server's livereload script if available -->
    <script>
      (function(){
        try{
          var s = document.createElement('script');
          s.src = 'http://127.0.0.1:35729/livereload.js?snipver=1';
          s.async = true;
          document.head.appendChild(s);
        }catch(e){ /* ignore */ }
      })();
    </script>
  </head>
  <body class="bg-white text-gray-800 leading-normal antialiased">
    <div class="min-h-screen flex flex-col">
  <a class="sr-only focus:not-sr-only" href="#about">Skip to content</a>
  <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-4xl mx-auto px-4 py-6 flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <img id="profileImage" src="" alt="Profile" loading="lazy" class="w-16 h-16 rounded-full object-cover ring-2 ring-blue-200" />
            <div>
              <h1 id="name" class="text-xl font-semibold text-gray-900"></h1>
              <p id="title" class="text-sm text-blue-600"></p>
            </div>
          </div>

          <nav aria-label="Primary" class="hidden md:flex items-center space-x-4">
            <a href="#about" class="nav-link text-sm text-gray-700 hover:text-blue-600">About</a>
            
            <a href="#skills" class="nav-link text-sm text-gray-700 hover:text-blue-600">Skills</a>
            <a href="#experience" class="nav-link text-sm text-gray-700 hover:text-blue-600">Experience</a>
            <a href="#education" class="nav-link text-sm text-gray-700 hover:text-blue-600">Education</a>
            <div id="socialLinks" class="flex items-center space-x-3"></div>
          </nav>

          <button id="mobileNavBtn" aria-expanded="false" class="md:hidden p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
        <div id="mobileNav" class="md:hidden max-w-4xl mx-auto px-4 pb-4 hidden">
          <div class="flex flex-col space-y-2">
            <a href="#about" class="text-gray-700 hover:text-blue-600">About</a>
            <a href="#skills" class="text-gray-700 hover:text-blue-600">Skills</a>
            <a href="#experience" class="text-gray-700 hover:text-blue-600">Experience</a>
            <a href="#education" class="text-gray-700 hover:text-blue-600">Education</a>
            <div id="mobileSocial" class="flex items-center space-x-3 pt-2"></div>
          </div>
        </div>
      </header>

      <main id="mainContent" class="flex-1 max-w-4xl mx-auto px-4 py-8 space-y-12">
        <div id="errorBanner" class="hidden max-w-4xl mx-auto px-4 py-3 rounded-md bg-red-50 border border-red-100 text-red-800"></div>
  <section id="hero" class="section-viewport bg-white rounded-lg shadow-sm p-6 md:p-10 flex flex-col md:flex-row items-center gap-6">
          <img id="heroProfile" src="" alt="Profile" loading="lazy" class="w-32 h-32 md:w-40 md:h-40 rounded-full object-cover ring-4 ring-blue-50 shadow-md" />
          <div class="flex-1">
            <h1 id="heroName" class="text-2xl md:text-3xl font-bold text-gray-900"></h1>
            <p id="heroTitle" class="text-blue-600 mt-1 font-medium"></p>
            <p id="heroTagline" class="mt-3 text-gray-700 max-w-2xl"></p>
            <div id="heroCtas" class="mt-4 flex items-center space-x-3"></div>
          </div>
          <div class="hidden md:block w-24"></div>
        </section>

        <section id="about" class="section-viewport">
          <h2 class="text-2xl font-semibold text-gray-900">About</h2>
          <div id="aboutText" class="mt-4 text-gray-700 prose"></div>
        </section>

        <section id="skills" class="section-viewport">
          <h2 class="text-2xl font-semibold text-gray-900">Skills</h2>
          <div id="skillsGrid" class="mt-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
        </section>

        <section id="experience" class="section-viewport">
          <h2 class="text-2xl font-semibold text-gray-900">Experience</h2>
          <div id="experienceTimeline" class="mt-6 space-y-6"></div>
        </section>

        <section id="education" class="section-viewport">
          <h2 class="text-2xl font-semibold text-gray-900">Education</h2>
          <div id="educationList" class="mt-4 space-y-4"></div>
        </section>
      </main>

      <footer class="bg-white border-t py-6">
        <div class="max-w-4xl mx-auto px-4 text-center text-sm text-gray-600">
          <span id="footerText"></span>
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
